{% extends 'shop/base.html' %}{% block title %}Регистрация — Твой орех{% endblock %}{% block content %}<div class="row justify-content-center"><div class="col-md-8 col-lg-6"><div class="card shadow-sm"><div class="card-body p-4"><h1 class="h3 mb-4">Создать аккаунт</h1><form method="post">{% csrf_token %}<div class="row">{% for field in form %}<div class="col-md-6 mb-3{% if field.name == 'username' or field.name == 'email' or 'password' in field.name %} col-12{% endif %}"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}</div>{% endfor %}</div><button class="btn btn-success w-100">Зарегистрироваться</button></form></div></div></div></div>{% endblock %}
