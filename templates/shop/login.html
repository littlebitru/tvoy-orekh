{% extends 'shop/base.html' %}{% block title %}Вход — Твой орех{% endblock %}{% block content %}<div class="row justify-content-center"><div class="col-md-6 col-lg-5"><div class="card shadow-sm"><div class="card-body p-4"><h1 class="h3 mb-4">Вход в кабинет</h1><form method="post">{% csrf_token %}{% if form.errors %}<div class="alert alert-danger">Проверьте логин и пароль.</div>{% endif %}<div class="mb-3"><label class="form-label">Логин</label><input class="form-control" type="text" name="username" autofocus required></div><div class="mb-3"><label class="form-label">Пароль</label><input class="form-control" type="password" name="password" required></div><button class="btn btn-success w-100">Войти</button></form><p class="text-center text-muted mt-3 mb-0">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p></div></div></div></div>{% endblock %}
